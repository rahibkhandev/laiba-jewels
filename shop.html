<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop All | Jewels by Laiba</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;1,500&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.344.0/dist/umd/lucide.min.js"></script>
</head>
<body>

    <div id="toast" class="toast">Link copied to clipboard!</div>
    <div id="backdrop" class="backdrop" onclick="toggleCart()"></div>

    <header>
        <div class="navbar">
            <div class="logo-area">
                <span class="logo-title">Jewels by Laiba</span>
                <span class="logo-sub">Minimal. Elegant. Everyday Luxury.</span>
            </div>
            <nav class="main-nav">
                <a href="index.html">Home</a>
                <a href="shop.html" class="active">Shop All</a>
            </nav>
            <div class="nav-actions">
                <button class="btn-icon" onclick="shareStore()" title="Share Store Layout">
                    <i data-lucide="share-2"></i>
                </button>
                <button class="btn-icon" onclick="toggleCart()" title="View Cart">
                    <i data-lucide="shopping-bag"></i>
                    <span id="cart-badge" class="badge">0</span>
                </button>
            </div>
        </div>
    </header>

    <main>
        <section class="shop-header">
            <h1>Shop All Jewelry</h1>
            <p>Every handpicked piece, in one place — filter by collection to find yours.</p>
        </section>

        <section class="filters">
            <button class="filter-btn" data-cat="All" onclick="filterCategory('All', this)">All Collections</button>
            <button class="filter-btn" data-cat="Necklaces" onclick="filterCategory('Necklaces', this)">Necklaces</button>
            <button class="filter-btn" data-cat="Rings" onclick="filterCategory('Rings', this)">Rings</button>
            <button class="filter-btn" data-cat="Bracelets" onclick="filterCategory('Bracelets', this)">Bracelets</button>
            <button class="filter-btn" data-cat="Earrings" onclick="filterCategory('Earrings', this)">Earrings</button>
            <button class="filter-btn" data-cat="Accessories" onclick="filterCategory('Accessories', this)">Accessories</button>
        </section>

        <div id="result-count" class="result-count"></div>
        <section id="grid" class="product-grid"></section>
    </main>

    <!-- Cart Layout -->
    <div id="cart-drawer" class="cart-drawer">
        <div class="cart-header">
            <h3>Your Bag</h3>
            <button class="btn-icon" onclick="toggleCart()"><i data-lucide="x"></i></button>
        </div>
        <div id="cart-items" class="cart-items">
            <!-- Items injected by JS -->
        </div>
        <div class="cart-footer">
            <div class="cart-total-row">
                <span>Subtotal</span>
                <span id="cart-subtotal">Rs 0</span>
            </div>
            <button class="btn-checkout" onclick="checkoutDemo()">Complete Mock Checkout</button>
        </div>
    </div>

    <script src="products.js"></script>
    <script src="cart.js"></script>
    <script>
        // ==================== SHOP PAGE ONLY LOGIC ====================
        // Unlike the home page, this page always shows the FULL list of
        // products for the selected category (no 4-item cap).

        window.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
            readSharedCartState();

            // Pre-filter from a link like shop.html?category=Rings
            const urlParams = new URLSearchParams(window.location.search);
            const requestedCat = urlParams.get('category') || 'All';
            const targetBtn = document.querySelector(`.filter-btn[data-cat="${requestedCat}"]`) || document.querySelector('.filter-btn[data-cat="All"]');
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            targetBtn.classList.add('active');
            renderProducts(targetBtn.dataset.cat);

            updateCartUI();
        });

        function renderProducts(category) {
            const grid = document.getElementById('grid');
            const countEl = document.getElementById('result-count');
            grid.innerHTML = '';

            const filtered = category === 'All' ? products : products.filter(p => p.category === category);
            countEl.textContent = `${filtered.length} product${filtered.length !== 1 ? 's' : ''}`;

            filtered.forEach(p => {
                grid.innerHTML += `
                    <div class="product-card">
                        <div class="image-placeholder" style="padding:0;">
                            <img src="${p.image}" alt="${p.title}" loading="lazy" referrerpolicy="no-referrer" style="width:100%;height:100%;object-fit:cover;" onerror="this.style.display='none'; this.parentElement.innerHTML='<i data-lucide=&quot;image&quot;></i>'; lucide.createIcons();">
                        </div>
                        <div class="card-body">
                            <div class="prod-title">${p.title}</div>
                            <div class="prod-meta">
                                <div class="prod-price">Rs ${p.price.toLocaleString()}</div>
                                <button class="btn-add" onclick="addToCart(${p.id})">
                                    <i data-lucide="plus" style="width:16px; height:16px;"></i> Add
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            });
            lucide.createIcons();
        }

        function filterCategory(category, element) {
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            element.classList.add('active');
            renderProducts(category);
        }
    </script>
</body>
</html>
